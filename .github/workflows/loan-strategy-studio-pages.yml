name: Publish Loan Strategy Studio

on:
  push:
    branches: ["main"]
    paths:
      - "loan-strategy-studio/**"
      - ".github/workflows/loan-strategy-studio-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "loan-strategy-studio-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: loan-strategy-studio
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
